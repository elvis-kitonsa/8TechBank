version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - app_logs:/app/logs
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - FLASK_DEBUG=False
    pids_limit: 50
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

volumes:
  app_logs:
