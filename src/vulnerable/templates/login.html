<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>8TechBank - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 10px;
        width: 380px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      .logo {
        text-align: center;
        margin-bottom: 30px;
      }
      .logo h1 {
        color: #0f3460;
        font-size: 28px;
      }
      .logo p {
        color: #888;
        font-size: 13px;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 8px 0 16px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }
      label {
        font-size: 13px;
        color: #555;
        font-weight: bold;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #0f3460;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
      }
      button:hover {
        background: #16213e;
      }
      .error {
        background: #ffe0e0;
        color: #c0392b;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 13px;
      }
      .link {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
      }
      .link a {
        color: #0f3460;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <h1>🏦 8TechBank</h1>
        <p>Secure Online Banking Portal</p>
      </div>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/login">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required />
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required />
        <button type="submit">Login</button>
      </form>
      <div class="link">Don't have an account? <a href="/register">Register here</a></div>
    </div>
  </body>
</html>
